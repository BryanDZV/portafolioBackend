spring.application.name=portafolioBackend
# Conexión a tu base de datos PostgreSQL local
spring.datasource.url=jdbc:postgresql://localhost:5432/portafolio_db
spring.datasource.username=postgres
spring.datasource.password=root

# Hibernate / JPA
# "update" creará las tablas automáticamente basándose en nuestro código Java
spring.jpa.hibernate.ddl-auto=update 
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect